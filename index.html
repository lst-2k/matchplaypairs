<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clubhouse Cup — Tournament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F4EC;
    --ink:#1B2B1F;
    --fairway:#1F4D2C;
    --fairway-light:#2E6B3E;
    --gold:#C9A227;
    --up:#2E6B3E;
    --down:#B3461C;
    --halved:#9A8C70;
    --line:#DDD6C5;
    --card:#FFFFFF;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{
    font-family:'Fraunces',serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* Header */
  header{
    background:var(--fairway);
    color:var(--cream);
    padding:28px 24px 22px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  header .wrap{max-width:1100px;margin:0 auto;position:relative;}
  header h1{font-size:clamp(28px,5vw,42px); font-weight:700;}
  header .meta{
    margin-top:10px;
    display:flex; flex-wrap:wrap; gap:10px 22px;
    font-size:14px; color:#D9E6DA;
  }

  /* Layout */
  .container{max-width:1100px; margin:0 auto; padding:24px;}
  .tabs{
    display:flex; gap:6px; flex-wrap:wrap;
    margin-bottom:20px;
    border-bottom:2px solid var(--line);
  }
  .tab{
    padding:10px 18px;
    background:none; border:none;
    font-family:'Fraunces',serif; font-size:16px; font-weight:600;
    color:#7A7363; cursor:pointer;
    border-bottom:3px solid transparent;
    transform:translateY(2px);
  }
  .tab.active{color:var(--fairway); border-bottom-color:var(--gold);}
  .panel{display:none;}
  .panel.active{display:block; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:18px;
  }
  .card h3{font-size:18px; margin-bottom:14px; color:var(--fairway);}

  select{
    font-family:inherit;
    font-size:14px;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    width:100%;
    max-width:560px;
  }

  .swatch{
    width:14px; height:14px; border-radius:4px; display:inline-block; margin-right:8px; vertical-align:middle;
    border:1px solid rgba(0,0,0,0.1);
  }

/* Fixtures modern split-row layout */
  .fixture-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .fixture-teams {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fixture-pair-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .fixture-match-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 16px;
    gap: 12px;
  }
  .fixture-side {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }
  .fixture-side.left-side {
    justify-content: flex-end;
  }
  .fixture-side.right-side {
    justify-content: flex-start;
  }
  .pill-slot {
    width: 85px;
    flex-shrink: 0;
    display: flex;
  }
  .pill-slot.left-pill {
    justify-content: flex-start;
  }
  .pill-slot.right-pill {
    justify-content: flex-end;
  }
  .players-slot {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex: 1;
  }
  /* Pushes names directly against the central VS */
  .players-slot.left-players {
    text-align: right;
  }
  .players-slot.right-players {
    text-align: left;
  }
  .fixture-vs-center {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    color: #C8BFA9;
    font-weight: 600;
    text-align: center;
    min-width: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .player-name {
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .round-label {
    font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold);
    font-weight:700; margin:18px 0 4px;
  }
  .round-label:first-child{margin-top:0;}
  .week-header {
    display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px 16px;
    margin:18px 0 4px;
  }
  .week-header:first-child{margin-top:0;}
  .week-header .round-label{margin:0;}
  .week-meta{font-size:13px; color:#7A7363;}
  
  .pill {
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .pill.neutral {
    background: #9A8C70;
    color: #fff;
  }
  
  @media (max-width: 640px) {
    /* Keep the horizontal 3-column layout exactly like landscape */
    .fixture-match-row {
      display: grid !important;
      grid-template-columns: 1fr auto 1fr !important;
      flex-direction: row !important;
      padding: 10px 8px;
      gap: 6px;
    }
    
    /* Maintain side structures */
    .fixture-side {
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      width: auto !important;
      gap: 8px;
    }
    .fixture-side.left-side {
      justify-content: flex-end !important;
      order: unset !important;
    }
    .fixture-side.right-side {
      justify-content: flex-start !important;
      order: unset !important;
    }

    /* Reset internal element ordering */
    .fixture-side.left-side .players-slot { order: unset !important; }
    .fixture-side.left-side .pill-slot { order: unset !important; }

    /* Keep player text aligned toward the central VS slot */
    .players-slot.left-players {
      text-align: right !important;
    }
    .players-slot.right-players {
      text-align: left !important;
    }

    /* Keep the pill slots fixed-width but slightly slimmer for narrow mobile screens */
    .pill-slot {
      width: 68px !important;
    }
    .pill-slot.left-pill { justify-content: flex-start !important; }
    .pill-slot.right-pill { justify-content: flex-end !important; }

    /* Scale fonts down slightly for perfect mobile fit */
    .player-name {
      font-size: 13px;
    }
    .pill {
      font-size: 10px;
      padding: 3px 7px;
    }
    
    /* Ensure the center element stays centered cleanly */
    .fixture-vs-center {
      order: unset !important;
      width: auto !important;
      min-width: 44px;
      margin: 0;
    }
    .fixture-vs-center::before,
    .fixture-vs-center::after {
      display: none !important; /* Remove the mobile divider lines */
    }
  }

  /* Scorecard */
  .scorecard-wrap{overflow-x:auto;}
  table.scorecard{
    border-collapse:collapse;
    width:100%;
    min-width:760px;
    font-size:13px;
  }
  table.scorecard th, table.scorecard td{
    border:1px solid var(--line);
    text-align:center;
    padding:6px 4px;
  }
  table.scorecard th{
    background:var(--fairway);
    color:var(--cream);
    font-weight:600;
    font-size:12px;
  }
  table.scorecard td.label{
    text-align:left; font-weight:600; background:var(--cream); white-space:nowrap; padding-left:10px;
  }
  table.scorecard td.out, table.scorecard th.out,
  table.scorecard td.in, table.scorecard th.in,
  table.scorecard td.tot, table.scorecard th.tot{
    background:#EFE9D8; font-weight:700;
  }
  td.noncounting-cell{color:#A39A85; background:#F8F5EC;}
  td.counting-cell{font-weight:700;}
  .win-ring{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%;
    border:2px solid;
    font-weight:700; font-family:'JetBrains Mono',monospace;
    font-size:12px; line-height:1;
  }
  .par-row td.label{background:#EFE9D8 !important;}
  .par-row td.par-cell{background:#F3EFE2; color:var(--gold); font-weight:700; font-family:'JetBrains Mono',monospace;}
  .hole-status{
    min-width:30px; height:22px; padding:0 5px; border-radius:11px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:#fff; margin:0 auto;
    font-family:'JetBrains Mono',monospace; letter-spacing:-0.02em;
  }
  .hole-status.empty{background:#EFEAE0; color:#C8BFA9; min-width:22px; width:22px; padding:0;}
  .scorecard-legend{
    display:flex; gap:18px; flex-wrap:wrap; align-items:center;
    font-size:12px; color:#7A7363; margin-top:10px;
  }
  .scorecard-legend .key{display:flex; align-items:center; gap:6px;}
  .scorecard-legend .swatch-box{
    width:16px; height:16px; border-radius:4px; display:inline-block; border:1px solid var(--line);
  }
  .scorecard-legend .swatch-box.counts{border:2px solid var(--fairway-light); background:#fff;}
  .scorecard-legend .swatch-box.nocounts{background:#F8F5EC;}
  .match-header{
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
    margin-bottom:14px;
  }
  .match-header h3{font-size:20px;}
  .status-line{margin-top:10px; font-size:14px; color:#5C5546;}

  /* Leaderboard */
  table.leaderboard{width:100%; border-collapse:collapse; font-size:15px;}
  table.leaderboard th, table.leaderboard td{
    padding:10px 12px; text-align:left; border-bottom:1px solid var(--line);
  }
  table.leaderboard th{
    font-family:'Fraunces',serif; font-size:13px; text-transform:uppercase; letter-spacing:.06em;
    color:#7A7363; font-weight:600;
  }
  table.leaderboard td.num, table.leaderboard th.num{text-align:center; font-family:'JetBrains Mono',monospace; font-weight:700;}
  table.leaderboard tr:first-child td{font-weight:700;}
  table.leaderboard tr:first-child{background:rgba(201,162,39,0.12);}

  .empty-state{
    text-align:center; padding:40px 20px; color:#9A8C70;
  }
  .empty-state h4{color:#7A7363; margin-bottom:6px;}

  @media (max-width: 640px){
    .container{padding:14px;}
    .card{padding:14px;}
    header{padding:20px 14px;}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1 id="venueDisplay">Clubhouse Cup</h1>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="fixtures">Fixtures</button>
    <button class="tab" data-tab="scoring">Scorecards</button>
    <button class="tab" data-tab="leaderboard">Leaderboard</button>
  </div>

  <!-- FIXTURES -->
  <section class="panel active" id="panel-fixtures">
    <div id="fixturesContainer"></div>
    <div id="fixturesEmpty" class="empty-state" style="display:none;">
      <h4>No fixtures yet</h4>
      <p>Check back once the tournament schedule has been published.</p>
    </div>
  </section>

  <!-- SCORING -->
  <section class="panel" id="panel-scoring">
    <div class="card">
      <h3>Select a match</h3>
      <select id="matchSelect" onchange="renderScoring()">
        <option value="">— choose a match —</option>
      </select>
    </div>
    <div id="scoringContainer"></div>
  </section>

  <!-- LEADERBOARD -->
  <section class="panel" id="panel-leaderboard">
    <div class="card">
      <h3>Team standings</h3>
      <div id="leaderboardContainer"></div>
    </div>
  </section>
</div>

<div id="loadError" class="container" style="display:none;">
  <div class="card">
    <h3>Couldn't load tournament data</h3>
    <p style="color:#7A7363;">Make sure <code>golf-tournament-data.json</code> has been exported and committed alongside this page.</p>
  </div>
</div>

<script>
/* ============ STATE ============ */
let state = {
  venue: '',
  date: '',
  teams: [],
  matches: [],
  par: {1:4,2:4,3:4,4:4,5:4,6:4,7:4,8:4,9:4,10:4,11:4,12:4,13:4,14:4,15:4,16:4,17:4,18:4}
};

/* ============ TABS ============ */

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='fixtures') renderFixtures();
    if(tab.dataset.tab==='scoring') renderScoring();
    if(tab.dataset.tab==='leaderboard') renderLeaderboard();
  });
});

/* ============ HELPERS ============ */

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str==null ? '' : String(str);
  return div.innerHTML;
}
function teamById(id){ return state.teams.find(t=>t.id===id); }
function playerById(teamId, playerId){
  const team = teamById(teamId);
  if(!team) return null;
  return team.players.find(p=>p.id===playerId);
}

/* ============ FIXTURES ============ */

function renderFixtures(){
  const container = document.getElementById('fixturesContainer');
  const empty = document.getElementById('fixturesEmpty');
  container.innerHTML = '';
  if(state.matches.length===0){ empty.style.display='block'; return; }
  empty.style.display='none';

  const rounds = {};
  state.matches.forEach(m=>{
    rounds[m.round] = rounds[m.round] || [];
    rounds[m.round].push(m);
  });

  Object.keys(rounds).sort((a,b)=>a-b).forEach(roundNum=>{
    const wInfo = (state.weekInfo && state.weekInfo[roundNum]) || {};
    const weekHeader = document.createElement('div');
    weekHeader.className = 'week-header';
    const metaParts = [];
    if(wInfo.venue) metaParts.push(escapeHTML(wInfo.venue));
    if(wInfo.date){
      const d = new Date(wInfo.date);
      metaParts.push(isNaN(d) ? escapeHTML(wInfo.date) : d.toLocaleDateString(undefined, {year:'numeric', month:'long', day:'numeric'}));
    }
    
    // Read the scoring format for this week from state.weekFormat (where the
    // admin tool stores it) and convert to a human-readable label.
    const weekFormatKey = (state.weekFormat && state.weekFormat[roundNum]) || '';
    let formatText = '';
    if(weekFormatKey === 'alternate') formatText = 'Alternate Shot';
    else if(weekFormatKey === 'bestball') formatText = '4 Ball Better Ball';
    else if(weekFormatKey === 'singles') formatText = 'Singles';
    else if(weekFormatKey) formatText = weekFormatKey; // fallback: show raw value

    // If weekFormat didn't have it, try individual match objects as a last resort
    if(!formatText && rounds[roundNum]){
      for(const m of rounds[roundNum]){
        const raw = m.format || m.matchFormat || m.type || m.mode || '';
        if(raw){
          if(raw.toLowerCase().includes('bestball') || raw.toLowerCase().includes('4ball') || raw.toLowerCase().includes('fourball'))
            formatText = '4 Ball Better Ball';
          else if(raw.toLowerCase().includes('single'))
            formatText = 'Singles';
          else if(raw.toLowerCase().includes('alternate'))
            formatText = 'Alternate Shot';
          else
            formatText = raw;
          break;
        }
      }
    }
    
    const formatStr = formatText ? ` &mdash; ${escapeHTML(formatText)}` : '';
    
    weekHeader.innerHTML = `
      <div class="round-label">Week ${roundNum}${formatStr}</div>
      <div class="week-meta">${metaParts.join(' &middot; ')}</div>
    `;
    container.appendChild(weekHeader);

    const groups = [];
    const groupIndex = {};
    rounds[roundNum].forEach(m=>{
      const key = [m.teamA, m.teamB].sort().join('|');
      if(!(key in groupIndex)){
        groupIndex[key] = groups.length;
        groups.push({left: m.teamA, right: m.teamB, matches:[]});
      }
      groups[groupIndex[key]].matches.push(m);
    });

    groups.forEach(group=>{
      const tLeft = teamById(group.left), tRight = teamById(group.right);
      if(!tLeft || !tRight) return;
      const card = document.createElement('div');
      card.className='fixture-card';

      const matchRows = group.matches.map((m, i)=>{
        const leftSide = (m.teamA===group.left) ? 'A' : 'B';
        const rightSide = leftSide==='A' ? 'B' : 'A';
        
        const leftTeamId = leftSide==='A' ? m.teamA : m.teamB;
        const rightTeamId = rightSide==='A' ? m.teamA : m.teamB;
        const leftTeam = teamById(leftTeamId);
        const rightTeam = teamById(rightTeamId);
        
        const leftPair = leftSide==='A' ? m.pairA : m.pairB;
        const rightPair = rightSide==='A' ? m.pairA : m.pairB;
        
        const leftColor = leftTeam ? leftTeam.color : 'var(--ink)';
        const rightColor = rightTeam ? rightTeam.color : 'var(--ink)';

        let leftPlayersHtml = '';
        if(leftPair && leftPair.length > 0){
          const p1 = playerById(leftTeamId, leftPair[0]);
          leftPlayersHtml += `<div class="player-name" style="color: ${leftColor}; font-weight:600;">${escapeHTML(p1 ? p1.name : '?')}</div>`;
          if(leftPair[1]){
            const p2 = playerById(leftTeamId, leftPair[1]);
            leftPlayersHtml += `<div class="player-name" style="color: ${leftColor}; opacity: 0.75; font-size: 13px; margin-top: 1px; font-weight:400;">${escapeHTML(p2 ? p2.name : '?')}</div>`;
          }
        }

        let rightPlayersHtml = '';
        if(rightPair && rightPair.length > 0){
          const p1 = playerById(rightTeamId, rightPair[0]);
          rightPlayersHtml += `<div class="player-name" style="color: ${rightColor}; font-weight:600;">${escapeHTML(p1 ? p1.name : '?')}</div>`;
          if(rightPair[1]){
            const p2 = playerById(rightTeamId, rightPair[1]);
            rightPlayersHtml += `<div class="player-name" style="color: ${rightColor}; opacity: 0.75; font-size: 13px; margin-top: 1px; font-weight:400;">${escapeHTML(p2 ? p2.name : '?')}</div>`;
          }
        }

        const st = computeMatchState(m);
        let leftPillHtml = '';
        let rightPillHtml = '';
        let centerHtml = 'vs';

        if(m.finalized && m.result){
          if(m.result.type==='halved'){
            centerHtml = `<span class="pill neutral">Halved</span>`;
          } else {
            const isLeftWinner = (m.result.winner === leftTeamId);
            const pillHtml = `<span class="pill" style="background:${isLeftWinner ? leftColor : rightColor}; color:${contrastTextColor(isLeftWinner ? leftColor : rightColor)};">${escapeHTML(m.result.label)}</span>`;
            if(isLeftWinner) leftPillHtml = pillHtml;
            else rightPillHtml = pillHtml;
          }
        } else if(st.contiguousThru===0){
          centerHtml = 'vs';
        } else if(st.diff===0){
          centerHtml = `<span class="pill neutral">AS thru ${st.contiguousThru}</span>`;
        } else {
          const isLeftLeading = (st.diff > 0 && m.teamA === leftTeamId) || (st.diff < 0 && m.teamB === leftTeamId);
          const leadingColor = isLeftLeading ? leftColor : rightColor;
          const pillHtml = `<span class="pill" style="background:${leadingColor}; color:${contrastTextColor(leadingColor)};">${Math.abs(st.diff)} UP</span>`;
          if(isLeftLeading) leftPillHtml = pillHtml;
          else rightPillHtml = pillHtml;
        }

        return `
          <div class="fixture-match-row">
            <div class="fixture-side left-side">
              <div class="pill-slot left-pill">${leftPillHtml}</div>
              <div class="players-slot left-players">
                ${leftPlayersHtml}
              </div>
            </div>
            
            <div class="fixture-vs-center">${centerHtml}</div>
            
            <div class="fixture-side right-side">
              <div class="players-slot right-players">
                ${rightPlayersHtml}
              </div>
              <div class="pill-slot right-pill">${rightPillHtml}</div>
            </div>
          </div>
        `;
      }).join('');

      card.innerHTML = `
        <div class="fixture-teams">
          <span class="swatch" style="background:${tLeft.color}"></span>${escapeHTML(tLeft.name)}
          <span style="color:#C8BFA9; font-size: 15px; font-family: 'Inter', sans-serif; font-weight:400;">vs</span>
          <span class="swatch" style="background:${tRight.color}"></span>${escapeHTML(tRight.name)}
        </div>
        <div class="fixture-pair-rows">${matchRows}</div>
      `;
      container.appendChild(card);
    });
  });
}

// Calculates layout and positioning for Ryder cup side-dependent pills
// Returns a small colored pill showing just the result/score (e.g. "3&2", "1 up", "AS thru 12"),
// colored with the leading/winning team's color.
function fixtureResultPill(m){
  const teamA = teamById(m.teamA), teamB = teamById(m.teamB);
  const st = computeMatchState(m);

  let text, bg, textColor;
  if(m.finalized && m.result){
    const r = m.result;
    if(r.type==='halved'){
      text = 'Halved'; bg = '#9A8C70'; textColor = '#fff';
    } else {
      const winnerTeam = r.winner===m.teamA ? teamA : teamB;
      text = r.label;
      bg = winnerTeam ? winnerTeam.color : '#9A8C70';
      textColor = contrastTextColor(bg);
    }
  } else if(st.contiguousThru===0){
    text = 'Not started'; bg = '#DDD6C5'; textColor = '#5C5546';
  } else if(st.diff===0){
    text = `AS thru ${st.contiguousThru}`; bg = '#9A8C70'; textColor = '#fff';
  } else {
    const leadingTeam = st.diff>0 ? teamA : teamB;
    text = `${Math.abs(st.diff)} up thru ${st.contiguousThru}`;
    bg = leadingTeam ? leadingTeam.color : '#2E6B3E';
    textColor = contrastTextColor(bg);
  }
  return `<span class="pill" style="background:${bg}; color:${textColor};">${escapeHTML(text)}</span>`;
}

/* ============ SCORING ENGINE ============ */
/* ============ SCORING ENGINE (read-only) ============ */
// Returns array of 18 hole results: 'A' win, 'B' win, 'halve', or null (not played)
/* ============ SCORING ENGINE (read-only) ============ */
/* ============ SCORING ENGINE (read-only) ============ */
function computeHoleResults(m){
  const results = [];
  
  // 💡 Ultra-robust format detection
  const formatName = m.format || (state.weekFormat && state.weekFormat[m.round]) || '';
  const cleanFormat = formatName.toLowerCase().replace(/[\s-_]/g, '');
  const isBetterBall = cleanFormat.includes('4ball') || 
                       cleanFormat.includes('betterball') || 
                       cleanFormat.includes('bestball') || 
                       cleanFormat.includes('fourball');
  const isSingles = cleanFormat.includes('single');

  for(let h=1; h<=18; h++){
    const rec = m.scores[h];
    if(!rec) { results.push(null); continue; }

    if (isBetterBall) {
      // 🏌️‍♂️ Better Ball / Four-Ball format
      const validA = [];
      if (rec['A0'] != null && rec['A0'] !== '') validA.push(Number(rec['A0']));
      if (rec['A1'] != null && rec['A1'] !== '') validA.push(Number(rec['A1']));

      const validB = [];
      if (rec['B0'] != null && rec['B0'] !== '') validB.push(Number(rec['B0']));
      if (rec['B1'] != null && rec['B1'] !== '') validB.push(Number(rec['B1']));

      if (validA.length === 0 || validB.length === 0) {
        results.push(null);
        continue;
      }

      const bestA = Math.min(...validA);
      const bestB = Math.min(...validB);

      if(bestA < bestB) results.push('A');
      else if(bestB < bestA) results.push('B');
      else results.push('halve');

    } else if (isSingles) {
      // 👤 Singles format: Always compare Player 0 (A0 vs B0) for every single hole
      const scoreA = rec['A0'];
      const scoreB = rec['B0'];
      if(scoreA == null || scoreB == null || scoreA==='' || scoreB===''){
        results.push(null); continue;
      }
      const sa = Number(scoreA), sb = Number(scoreB);
      if(sa < sb) results.push('A');
      else if(sb < sa) results.push('B');
      else results.push('halve');

    } else {
      // 🔄 Default fallback: Alternate Hole format logic
      const countingIdx = (h % 2 === 1) ? 0 : 1;
      const scoreA = rec['A'+countingIdx];
      const scoreB = rec['B'+countingIdx];
      if(scoreA == null || scoreB == null || scoreA==='' || scoreB===''){
        results.push(null); continue;
      }
      const sa = Number(scoreA), sb = Number(scoreB);
      if(sa < sb) results.push('A');
      else if(sb < sa) results.push('B');
      else results.push('halve');
    }
  }
  return results;
}

function computeMatchState(m){
  const holeResults = computeHoleResults(m);
  let diff = 0;
  let lastPlayedHole = 0;
  let contiguousThru = 0;
  let hasGap = false;
  let decidedAtHole = null;
  const running = [];
  for(let h=1; h<=18; h++){
    const r = holeResults[h-1];
    if(r===null){
      hasGap = true;
      running.push(diff);
      continue;
    }
    lastPlayedHole = h;
    if(r==='A') diff += 1;
    else if(r==='B') diff -= 1;
    running.push(diff);

    if(!hasGap){
      contiguousThru = h;
      if(decidedAtHole===null){
        const holesRemaining = 18 - h;
        const lead = Math.abs(diff);
        if(lead > holesRemaining){
          decidedAtHole = h;
        }
      }
    }
  }
  return {holeResults, running, diff, lastPlayedHole, contiguousThru, decidedAtHole};
}

function matchStatus(m){
  const teamA = teamById(m.teamA), teamB = teamById(m.teamB);
  const st = computeMatchState(m);

  function formatMatchMargin(margin, remaining){
    if(remaining===0) return `${margin} up`;
    return `${margin}&${remaining}`;
  }

  if(m.finalized && m.result){
    const r = m.result;
    if(r.type==='halved') return {label:'Halved', cls:'final', value:r};
    const winner = r.winner===m.teamA ? teamA : teamB;
    return {label:`${escapeHTML(winner.name)} won ${r.label}`, cls: (r.winner===m.teamA?'up':'down')+' final', value:r};
  }

  if(st.contiguousThru===0){
    return {label:'Not started', cls:''};
  }

  if(st.decidedAtHole !== null){
    const holesRemaining = 18 - st.decidedAtHole;
    const leadAtDecision = Math.abs(st.running[st.decidedAtHole-1]);
    const margin = leadAtDecision;
    const remaining = holesRemaining;
    const label = formatMatchMargin(margin, remaining);
    return {label: `${st.diff>0?'A':'B'} wins ${label}`, cls: st.diff>0?'up':'down', autofinal:true};
  }

  if(st.contiguousThru===18){
    if(st.diff===0) return {label:'All Square — final', cls:'', autofinal:true};
    const margin = Math.abs(st.diff);
    return {label:`${st.diff>0?'A':'B'} wins ${formatMatchMargin(margin, 0)}`, cls: st.diff>0?'up':'down', autofinal:true};
  }

  const holesPlayed = st.contiguousThru;
  const thru = `thru ${holesPlayed}`;
  if(st.diff===0) return {label:`AS ${thru}`, cls:''};
  const dir = st.diff>0 ? 'up' : 'down';
  return {label:`${Math.abs(st.diff)}↑ ${thru}`, cls:dir};
}

/* ============ SCORECARD UI ============ */
function renderMatchSelect(){
  const select = document.getElementById('matchSelect');
  const current = select.value;
  select.innerHTML = '<option value="">— choose a match —</option>';
  const sorted = state.matches.slice().sort((a,b)=>a.round-b.round);
  sorted.forEach(m=>{
    const ta = teamById(m.teamA), tb = teamById(m.teamB);
    if(!ta||!tb) return;
    const opt = document.createElement('option');
    opt.value = m.id;
    const status = matchStatus(m);
    const namesA = (m.pairA||[]).map(pid=>playerById(m.teamA,pid)).filter(p=>p).map(p=>p.name).join(' & ') || '?';
    const namesB = (m.pairB||[]).map(pid=>playerById(m.teamB,pid)).filter(p=>p).map(p=>p.name).join(' & ') || '?';
    opt.textContent = `Week ${m.round}: ${ta.name} (${namesA}) vs ${tb.name} (${namesB})${m.finalized ? ' — ' + status.label : ''}`;
    select.appendChild(opt);
  });
  if(state.matches.find(m=>m.id===current)) select.value = current;
}

function renderScoring(){
  renderMatchSelect();
  const container = document.getElementById('scoringContainer');
  const select = document.getElementById('matchSelect');
  const matchId = select.value;
  container.innerHTML = '';

  if(!matchId){
    container.innerHTML = `<div class="empty-state"><h4>No match selected</h4><p>Choose a match above to view its scorecard.</p></div>`;
    return;
  }
  const m = state.matches.find(mm=>mm.id===matchId);
  if(!m) return;
  const ta = teamById(m.teamA), tb = teamById(m.teamB);
  const pA = m.pairA.map(pid=>playerById(m.teamA,pid));
  const pB = m.pairB.map(pid=>playerById(m.teamB,pid));

  const card = document.createElement('div');
  card.className='card';

  const status = matchStatus(m);
  const endedEarly = m.finalized && m.result && m.result.type==='decided' && m.result.remaining > 0;

  // Robust format detection
  const formatName = m.format || (state.weekFormat && state.weekFormat[m.round]) || '';
  const cleanFormat = formatName.toLowerCase().replace(/[\s-_]/g, '');
  const isBetterBall = cleanFormat.includes('4ball') || 
                       cleanFormat.includes('betterball') || 
                       cleanFormat.includes('bestball') || 
                       cleanFormat.includes('fourball');
  const isSingles = cleanFormat.includes('single');

  // 🎨 Calculate dynamic team colors for the scorecard header status pill
  const st = computeMatchState(m);
  let pillBg = '#9A8C70'; // Default gray for All Square / Halved
  let pillColor = '#fff';

  if(m.finalized && m.result){
    if(m.result.type !== 'halved'){
      const winnerTeam = m.result.winner === m.teamA ? ta : tb;
      if(winnerTeam) {
        pillBg = winnerTeam.color;
        pillColor = contrastTextColor(pillBg);
      }
    }
  } else if(st.contiguousThru === 0){
    pillBg = '#DDD6C5'; // Not started
    pillColor = '#5C5546';
  } else if(st.diff !== 0){
    const leadingTeam = st.diff > 0 ? ta : tb;
    if(leadingTeam) {
      pillBg = leadingTeam.color;
      pillColor = contrastTextColor(pillBg);
    }
  }

  card.innerHTML = `
    <div class="match-header">
      <h3><span class="swatch" style="background:${ta.color}"></span>${escapeHTML(ta.name)} <span style="color:#C8BFA9;">vs</span> <span class="swatch" style="background:${tb.color}"></span>${escapeHTML(tb.name)}</h3>
      <span class="pill ${status.cls}" style="background:${pillBg}; color:${pillColor};">${status.label}</span>
    </div>
    <div class="scorecard-wrap"></div>
    
    ${(isBetterBall || isSingles) ? '' : `
    <div class="scorecard-legend">
      <span class="key"><span class="swatch-box counts"></span> Counts toward match result</span>
      <span class="key"><span class="swatch-box nocounts"></span> Recorded for the round, doesn't affect the match</span>
    </div>
    `}
    
    ${endedEarly ? `<div class="status-line">Match ended ${m.result.label} — remaining holes aren't shown since they didn't affect the result.</div>` : ''}
    <div class="status-line" id="statusLine"></div>
  `;
  container.appendChild(card);
  card.querySelector('.scorecard-wrap').appendChild(buildScorecardTable(m, pA, pB));

  updateStatusLine(m);
}

function buildScorecardTable(m, pA, pB){
  const table = document.createElement('table');
  table.className='scorecard';

  let lastRelevantHole = 18;
  if(m.finalized && m.result && m.result.type==='decided' && typeof m.result.remaining === 'number'){
    lastRelevantHole = 18 - m.result.remaining;
  }

  let thead = '<thead><tr><th>Player</th>';
  for(let h=1; h<=9; h++) thead += `<th>${h}</th>`;
  thead += `<th class="out">OUT</th>`;
  for(let h=10; h<=18; h++) thead += `<th>${h}</th>`;
  thead += `<th class="in">IN</th><th class="tot">TOT</th></tr></thead>`;
  table.innerHTML = thead;

  const tbody = document.createElement('tbody');
  tbody.appendChild(buildParRow(lastRelevantHole));

  // Pre-compute hole results and team colours so buildPlayerRow can
  // highlight winning scores with a coloured ring.
  const holeResults = computeHoleResults(m);
  const teamAColor = (teamById(m.teamA) || {}).color || '#1F4D2C';
  const teamBColor = (teamById(m.teamB) || {}).color || '#0B3D91';

  const isSingles = m.format === 'singles' || pA.filter(p=>p).length <= 1;

  if (isSingles) {
    tbody.appendChild(buildPlayerRow(m, {team:'A', idx:0, player:pA[0], oddEven:'all'}, lastRelevantHole, holeResults, teamAColor));
  } else {
    [
      {team:'A', idx:0, player:pA[0], oddEven:'odd'},
      {team:'A', idx:1, player:pA[1], oddEven:'even'},
    ].forEach(rowDef=>tbody.appendChild(buildPlayerRow(m, rowDef, lastRelevantHole, holeResults, teamAColor)));
  }

  tbody.appendChild(buildResultRow(m, lastRelevantHole));

  if (isSingles) {
    tbody.appendChild(buildPlayerRow(m, {team:'B', idx:0, player:pB[0], oddEven:'all'}, lastRelevantHole, holeResults, teamBColor));
  } else {
    [
      {team:'B', idx:0, player:pB[0], oddEven:'odd'},
      {team:'B', idx:1, player:pB[1], oddEven:'even'},
    ].forEach(rowDef=>tbody.appendChild(buildPlayerRow(m, rowDef, lastRelevantHole, holeResults, teamBColor)));
  }

  table.appendChild(tbody);
  return table;
}

function buildParRow(lastRelevantHole){
  const tr = document.createElement('tr');
  tr.className = 'par-row';
  let html = `<td class="label" style="background:#EFE9D8;">Par</td>`;
  let outSum=0, inSum=0, total=0;

  for(let h=1; h<=9; h++){
    const val = Number(state.par[h]) || 0;
    const hidden = h > lastRelevantHole;
    html += `<td class="par-cell">${hidden ? '' : (val||'')}</td>`;
    if(!hidden) outSum += val;
  }
  total += outSum;
  html += `<td class="out">${outSum||''}</td>`;
  for(let h=10; h<=18; h++){
    const val = Number(state.par[h]) || 0;
    const hidden = h > lastRelevantHole;
    html += `<td class="par-cell">${hidden ? '' : (val||'')}</td>`;
    if(!hidden) inSum += val;
  }
  total += inSum;
  html += `<td class="in">${inSum||''}</td>`;
  html += `<td class="tot">${total||''}</td>`;
  tr.innerHTML = html;
  return tr;
}

function buildPlayerRow(m, {team, idx, player, oddEven}, lastRelevantHole, holeResults, teamColor){
  // 💡 Ultra-robust format detection
  const formatName = m.format || (state.weekFormat && state.weekFormat[m.round]) || '';
  const cleanFormat = formatName.toLowerCase().replace(/[\s-_]/g, '');
  const isBetterBall = cleanFormat.includes('4ball') || 
                       cleanFormat.includes('betterball') || 
                       cleanFormat.includes('bestball') || 
                       cleanFormat.includes('fourball');
  const isSingles = cleanFormat.includes('single');

  const tr = document.createElement('tr');

  // 👤 Clean UI: If it's a Singles match, hide the ghost second rows completely
  if (isSingles && !player) {
    tr.style.display = 'none';
    return tr;
  }

  // 💡 Adjust subtext hint next to player names
  let labelHint = '';
  if (isBetterBall) {
    labelHint = '(Best ball counts)';
  } else if (isSingles) {
    labelHint = '(All holes count)';
  } else {
    labelHint = (oddEven === 'all' ? '(counts: all holes)' : `(counts: ${oddEven==='odd'?'1,3,5...17':'2,4,6...18'})`);
  }

  let html = `<td class="label">${escapeHTML(player ? player.name : '?')} <span style="color:#B7AE99; font-size:11px;">${labelHint}</span></td>`;
  let outSum=0, inSum=0, total=0;

  // Helper: wrap score in a ring only if this team won this hole AND
  // this player's score was the one that counted for that hole.
  const scoreDisplay = (h, v, isCounting) => {
    if(v == null) return '';
    const holeResult = holeResults && holeResults[h-1];
    const thisTeamWon = holeResult === team; // 'A' or 'B' matches team param
    if(thisTeamWon && isCounting && teamColor){
      return `<span class="win-ring" style="border-color:${teamColor};">${v}</span>`;
    }
    return v;
  };

  for(let h=1; h<=9; h++){
    const hidden = h > lastRelevantHole;
    const v = hidden ? null : getScore(m,h,team,idx);

    let isCounting = false;
    if(isBetterBall){
      // Only ring this player's score if it's strictly lower than their partner's
      // (the partner is always the other idx: 0→1, 1→0)
      const partnerScore = hidden ? null : getScore(m,h,team,1-idx);
      if(v!=null && (partnerScore==null || v < partnerScore)) isCounting = true;
    } else if(isSingles){
      isCounting = (idx === 0);
    } else {
      isCounting = oddEven === 'all' || (oddEven==='odd' && h%2===1) || (oddEven==='even' && h%2===0);
    }

    html += `<td class="${(isBetterBall||isSingles||(oddEven==='all')||(oddEven==='odd'&&h%2===1)||(oddEven==='even'&&h%2===0))?'counting-cell':'noncounting-cell'}">${scoreDisplay(h,v,isCounting)}</td>`;
    if(v!=null){ outSum+=v; total+=v; }
  }
  html += `<td class="out">${outSum||''}</td>`;
  for(let h=10; h<=18; h++){
    const hidden = h > lastRelevantHole;
    const v = hidden ? null : getScore(m,h,team,idx);

    let isCounting = false;
    if(isBetterBall){
      const partnerScore = hidden ? null : getScore(m,h,team,1-idx);
      if(v!=null && (partnerScore==null || v < partnerScore)) isCounting = true;
    } else if(isSingles){
      isCounting = (idx === 0);
    } else {
      isCounting = oddEven === 'all' || (oddEven==='odd' && h%2===1) || (oddEven==='even' && h%2===0);
    }

    html += `<td class="${(isBetterBall||isSingles||(oddEven==='all')||(oddEven==='odd'&&h%2===1)||(oddEven==='even'&&h%2===0))?'counting-cell':'noncounting-cell'}">${scoreDisplay(h,v,isCounting)}</td>`;
    if(v!=null){ inSum+=v; total+=v; }
  }
  html += `<td class="in">${inSum||''}</td>`;
  html += `<td class="tot">${total||''}</td>`;
  tr.innerHTML = html;
  return tr;
}

function getScore(m, hole, team, idx){
  const rec = m.scores[hole];
  if(!rec) return null;
  const key = team+idx;
  const v = rec[key];
  return (v===undefined || v==='' || v===null) ? null : Number(v);
}

function buildResultRow(m, lastRelevantHole){
  const tr = document.createElement('tr');
  const st = computeMatchState(m);
  const teamA = teamById(m.teamA), teamB = teamById(m.teamB);
  let html = `<td class="label" style="background:#EFE9D8;">Match status</td>`;
  for(let h=1; h<=9; h++) html += (h > lastRelevantHole) ? `<td><span class="hole-status empty"></span></td>` : statusCellHTML(st, h, teamA, teamB);
  html += `<td class="out"></td>`;
  for(let h=10; h<=18; h++) html += (h > lastRelevantHole) ? `<td><span class="hole-status empty"></span></td>` : statusCellHTML(st, h, teamA, teamB);
  html += `<td class="in"></td><td class="tot"></td>`;
  tr.innerHTML = html;
  return tr;
}

function contrastTextColor(hex){
  if(!hex) return '#fff';
  const c = hex.replace('#','');
  if(c.length!==6) return '#fff';
  const r = parseInt(c.substr(0,2),16);
  const g = parseInt(c.substr(2,2),16);
  const b = parseInt(c.substr(4,2),16);
  const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
  return luminance > 0.6 ? '#1B2B1F' : '#fff';
}

function statusCellHTML(st, h, teamA, teamB){
  const r = st.holeResults[h-1];
  if(r===null){
    return `<td><span class="hole-status empty"></span></td>`;
  }
  const diff = st.running[h-1];
  let label, bg, textColor;
  if(diff===0){
    label = 'AS'; bg = '#9A8C70'; textColor = '#fff';
  } else {
    const leadingTeam = diff>0 ? teamA : teamB;
    label = `${Math.abs(diff)}up`;
    bg = leadingTeam ? leadingTeam.color : '#9A8C70';
    textColor = contrastTextColor(bg);
  }
  return `<td><span class="hole-status" style="background:${bg}; color:${textColor};">${label}</span></td>`;
}

function updateStatusLine(m){
  const el = document.getElementById('statusLine');
  if(!el) return;
  const st = computeMatchState(m);
  const ta = teamById(m.teamA), tb = teamById(m.teamB);
  if(st.contiguousThru===0){
    el.textContent = 'No scores entered yet for this match.';
    return;
  }
  let txt = `Through hole ${st.contiguousThru}: `;
  if(st.diff===0) txt += 'All Square.';
  else txt += `${st.diff>0?ta.name:tb.name} ${Math.abs(st.diff)} up.`;
  if(m.finalized && m.result){
    if(m.result.type==='halved') txt = 'Final result: Halved (All Square through 18).';
    else {
      const winner = m.result.winner===m.teamA ? ta : tb;
      txt = `Final result: ${winner.name} won ${m.result.label}.`;
    }
  }
  el.textContent = txt;
}

/* ============ LEADERBOARD ============ */
function renderLeaderboard(){
  const lbContainer = document.getElementById('leaderboardContainer');

  if(state.teams.length===0){
    lbContainer.innerHTML = '<div class="empty-state"><h4>No teams yet</h4><p>Check back once the tournament has been set up.</p></div>';
    return;
  }

  const standings = {};
  state.teams.forEach(t=>{
    standings[t.id] = {team:t, points:0, played:0, won:0, halved:0, lost:0};
  });

  state.matches.forEach(m=>{
    const ta = teamById(m.teamA), tb = teamById(m.teamB);
    if(!ta || !tb) return;
    if(!m.finalized || !m.result) return;

    standings[ta.id].played++;
    standings[tb.id].played++;

    if(m.result.type==='halved'){
      standings[ta.id].points += 1;
      standings[tb.id].points += 1;
      standings[ta.id].halved++;
      standings[tb.id].halved++;
    } else {
      const winnerId = m.result.winner;
      const loserId = winnerId===m.teamA ? m.teamB : m.teamA;
      standings[winnerId].points += 2;
      standings[winnerId].won++;
      standings[loserId].lost++;
    }
  });

  const rows = Object.values(standings).sort((a,b)=>{
    if(b.points!==a.points) return b.points-a.points;
    if(b.won!==a.won) return b.won-a.won;
    return a.team.name.localeCompare(b.team.name);
  });

  let html = `<table class="leaderboard"><thead><tr>
    <th>Team</th><th class="num">Pld</th><th class="num">W</th><th class="num">H</th><th class="num">L</th><th class="num">Pts</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{
    html += `<tr>
      <td><span class="swatch" style="background:${r.team.color}"></span>${escapeHTML(r.team.name)}</td>
      <td class="num">${r.played}</td>
      <td class="num">${r.won}</td>
      <td class="num">${r.halved}</td>
      <td class="num">${r.lost}</td>
      <td class="num">${r.points}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  lbContainer.innerHTML = html;
}

/* ============ LOAD DATA ============ */
async function loadData(){
  try{
    const res = await fetch('golf-tournament-data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('Failed to fetch golf-tournament-data.json');
    const data = await res.json();
    // 💡 Added weekFormat:{} here so the frontend reads the match types
    state = Object.assign({tournamentName:'',teams:[],matches:[],par:{},weekInfo:{},weekFormat:{}}, data);
    const DEFAULT_PAR = {1:4,2:4,3:4,4:4,5:4,6:4,7:4,8:4,9:4,10:4,11:4,12:4,13:4,14:4,15:4,16:4,17:4,18:4};
    state.par = Object.assign({...DEFAULT_PAR}, state.par || {});
    state.weekInfo = state.weekInfo || {};

    document.getElementById('venueDisplay').textContent = state.tournamentName ? state.tournamentName : 'Clubhouse Cup';

    renderFixtures();
    renderMatchSelect();
    renderScoring();
    renderLeaderboard();
  }catch(err){
    console.error(err);
    document.querySelector('.tabs').style.display='none';
    document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
    document.getElementById('loadError').style.display='block';
  }
}

loadData();
